<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลการดำเนินการติดตั้งมิเตอร์ — แดชบอร์ด กฟฟ.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f2fb;
    --surface:#ffffff;
    --primary:#5b2a86;
    --primary-dark:#3a1a5c;
    --accent:#8b5cf6;
    --accent-soft:#efe7fb;
    --text:#241934;
    --muted:#6f6580;
    --border:#e3dcf1;
    --success:#1c9a5b;
    --success-bg:#e7f7ee;
    --warning:#c9821a;
    --warning-bg:#fdf1de;
    --danger:#d63b3b;
    --danger-bg:#fceaea;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans Thai','Noto Sans',sans-serif;
    min-height:100vh;
  }

  /* Header with subtle "power line" motif */
  header{
    position:relative;
    background:linear-gradient(135deg,var(--primary-dark),var(--primary) 60%,var(--accent));
    color:#fff;
    padding:28px 28px 22px;
    overflow:hidden;
  }
  header .motif{
    position:absolute; inset:0; opacity:.18; pointer-events:none;
  }
  header .inner{ position:relative; z-index:1; max-width:1400px; margin:0 auto; }
  header .eyebrow{
    font-size:12.5px; letter-spacing:.14em; text-transform:uppercase;
    opacity:.85; font-weight:600; margin-bottom:6px;
  }
  header h1{
    margin:0 0 4px; font-size:clamp(20px,2.6vw,28px); font-weight:800; line-height:1.3;
  }
  header p.sub{ margin:0; opacity:.88; font-size:14px; }

  .wrap{ max-width:1400px; margin:0 auto; padding:20px 20px 60px; }

  .toolbar{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
    display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:space-between;
    margin-top:-34px; position:relative; z-index:2;
    box-shadow:0 8px 24px -12px rgba(59,20,90,.25);
  }
  .toolbar .filter-group{ display:flex; align-items:center; gap:10px; flex:1; min-width:260px; }
  .filter-group label{ font-size:13px; font-weight:600; color:var(--muted); white-space:nowrap; }
  .combo{ position:relative; flex:1; max-width:340px; }
  .combo input{
    width:100%; padding:10px 34px 10px 14px; border-radius:9px;
    border:1.5px solid var(--border); font-size:14px; font-family:inherit;
    color:var(--text); background:#fff; outline:none; transition:border-color .15s;
  }
  .combo input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .combo::after{
    content:"▾"; position:absolute; right:12px; top:50%; transform:translateY(-50%);
    color:var(--muted); pointer-events:none; font-size:12px;
  }
  .clear-btn{
    background:none; border:1px solid var(--border); color:var(--muted);
    border-radius:8px; padding:9px 12px; font-size:13px; cursor:pointer; font-family:inherit;
  }
  .clear-btn:hover{ background:var(--accent-soft); color:var(--primary); }

  .actions{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    border:none; border-radius:9px; padding:10px 16px; font-size:13.5px; font-weight:600;
    cursor:pointer; font-family:inherit; transition:filter .15s, transform .1s;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-outline{ background:#fff; color:var(--primary); border:1.5px solid var(--accent-soft); }
  .btn-outline:hover{ background:var(--accent-soft); }
  .btn[disabled]{ opacity:.55; cursor:not-allowed; }
  .spin{ animation:spin 1s linear infinite; display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .status-line{
    max-width:1400px; margin:14px auto 0; padding:0 20px;
    display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted); flex-wrap:wrap;
  }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--success); flex:none; }
  .dot.err{ background:var(--danger); }
  .dot.loading{ background:var(--warning); }
  .status-line .count{ font-weight:700; color:var(--primary); }

  .error-box{
    max-width:1400px; margin:14px auto 0; padding:14px 16px;
    background:var(--danger-bg); border:1px solid #f2c6c6; color:#8a2626;
    border-radius:10px; font-size:13.5px; line-height:1.6;
  }
  .error-box code{ background:#fff; padding:1px 6px; border-radius:5px; font-size:12px; }

  .table-shell{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    margin-top:18px; overflow:hidden; box-shadow:0 1px 3px rgba(59,20,90,.05);
  }
  .table-scroll{ overflow:auto; max-height:70vh; }
  table{ border-collapse:collapse; width:100%; font-size:13.5px; min-width:600px; }
  thead th{
    position:sticky; top:0; z-index:3;
    background:var(--primary); color:#fff; text-align:left;
    padding:12px 14px; font-weight:700; font-size:12.5px; letter-spacing:.02em;
    white-space:nowrap; border-right:1px solid rgba(255,255,255,.12);
  }
  thead th:first-child{ z-index:4; }
  tbody td{
    padding:10px 14px; border-bottom:1px solid var(--border); white-space:nowrap;
  }
  tbody tr:nth-child(even){ background:#faf8fd; }
  tbody tr:hover{ background:var(--accent-soft); }
  tbody tr.total-row{ background:#efe6fa; font-weight:800; }
  tbody tr.total-row:hover{ background:#e6d9f7; }
  td.num{ text-align:right; font-variant-numeric:tabular-nums; }
  td.pea-col{ font-weight:600; color:var(--primary-dark); }

  .pct-pill{
    display:inline-block; padding:3px 10px; border-radius:999px; font-weight:700; font-size:12.5px;
  }
  .pct-good{ background:var(--success-bg); color:var(--success); }
  .pct-mid{ background:var(--warning-bg); color:var(--warning); }
  .pct-low{ background:var(--danger-bg); color:var(--danger); }

  .empty-state{
    padding:60px 20px; text-align:center; color:var(--muted);
  }
  .empty-state .big{ font-size:34px; margin-bottom:8px; }

  .chart-shell{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    margin-top:18px; padding:20px 22px 8px; box-shadow:0 1px 3px rgba(59,20,90,.05);
  }
  .chart-head h2{ margin:0 0 3px; font-size:16px; font-weight:800; color:var(--primary-dark); }
  .chart-head p{ margin:0 0 10px; font-size:12.5px; color:var(--muted); }
  .chart-legend{ display:flex; gap:16px; margin-bottom:10px; font-size:12.5px; color:var(--muted); }
  .chart-legend span{ display:inline-flex; align-items:center; gap:6px; }
  .chart-legend i{ width:11px; height:11px; border-radius:3px; display:inline-block; }
  .chart-scroll{ overflow-x:auto; padding-bottom:8px; }
  #chartInner{ display:inline-block; min-width:100%; }
  #chartInner svg{ display:block; }

  footer{
    max-width:1400px; margin:18px auto 0; padding:0 20px 10px;
    font-size:12.5px; color:var(--muted); display:flex; gap:6px; flex-wrap:wrap; align-items:center;
  }
  footer a{ color:var(--primary); font-weight:600; text-decoration:none; }
  footer a:hover{ text-decoration:underline; }

  ::-webkit-scrollbar{ height:10px; width:10px; }
  ::-webkit-scrollbar-thumb{ background:var(--accent-soft); border-radius:8px; }
  ::-webkit-scrollbar-thumb:hover{ background:#d8c8f2; }

  @media (max-width:640px){
    header{ padding:22px 16px 20px; }
    .toolbar{ margin-top:-24px; padding:14px; }
    .toolbar .filter-group{ min-width:100%; }
    .combo{ max-width:none; }
  }
</style>
</head>
<body>

<header>
  <svg class="motif" viewBox="0 0 1400 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="-50,180 150,180 200,60 260,60 310,180 1450,180" fill="none" stroke="#ffffff" stroke-width="2"/>
    <polyline points="-50,120 100,120 150,20 210,20 250,120 1450,120" fill="none" stroke="#ffffff" stroke-width="1.5" opacity=".6"/>
    <circle cx="200" cy="60" r="4" fill="#fff"/>
    <circle cx="260" cy="60" r="4" fill="#fff"/>
    <circle cx="150" cy="20" r="3" fill="#fff"/>
    <circle cx="210" cy="20" r="3" fill="#fff"/>
  </svg>
  <div class="inner">
    <h1 id="pageTitle">กำลังโหลดชื่อรายงาน...</h1>
  </div>
</header>

<div class="wrap">

  <div class="toolbar">
    <div class="filter-group">
      <label for="peaSearch">กรอง กฟฟ.</label>
      <div class="combo">
        <input id="peaSearch" list="peaList" placeholder="พิมพ์ชื่อ หรือคลิกเพื่อเลื่อนเลือก..." autocomplete="off">
        <datalist id="peaList"></datalist>
      </div>
      <button class="clear-btn" id="clearFilter">ล้างตัวกรอง</button>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="refreshBtn">
        <span id="refreshIcon">🔄</span> อัปเดตข้อมูลทันที
      </button>
    </div>
  </div>

  <div class="status-line" id="statusLine">
    <span class="dot loading" id="statusDot"></span>
    <span id="statusText">กำลังโหลดข้อมูล...</span>
  </div>

  <div id="errorBox"></div>

  <div class="table-shell">
    <div class="table-scroll">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="chart-shell" id="chartShell">
    <div class="chart-head">
      <h2>เปรียบเทียบระยะทาง แผน vs ผลการดำเนินการ</h2>
      <p>รวมระยะทางทั้งหมดต่อ กฟฟ. (วงจร-กม.) — กรองด้วยช่องค้นหาด้านบนได้เช่นกัน</p>
      <div class="chart-legend">
        <span><i style="background:#c4b5f2"></i>แผน</span>
        <span><i style="background:#5b2a86"></i>ผลการดำเนินการ</span>
      </div>
    </div>
    <div class="chart-scroll">
      <div id="chartInner"></div>
    </div>
  </div>

</div>

<script>
  const SHEET_ID = '1laynWog_q75KBV17Uwij0JFeDIU5hAzbzT0zqUNESv0';
  const GID = '0'; // เปลี่ยนเลขนี้หากข้อมูลอยู่คนละแท็บ (ดูเลขท้าย gid= ใน URL ของแท็บนั้น)
  // ใช้ endpoint gviz แทน /export?format=csv เพราะ /export ไม่รองรับ CORS
  // ทำให้ fetch() จากหน้าเว็บอื่นถูกเบราว์เซอร์บล็อกแม้ชีตจะแชร์แบบ "ทุกคนที่มีลิงก์ดูได้" แล้วก็ตาม
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;
  const EDIT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?usp=sharing`;

  let dataRowsAll = [];   // data rows only (excludes title + header rows)
  let headers = [];
  let peaColIndex = -1;
  let pctColIndex = -1;
  let planColIndex = -1;
  let actualColIndex = -1;
  let lastAutoRefreshDate = null;

  function parseCSV(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for(let i=0;i<text.length;i++){
      const c = text[i];
      if(inQuotes){
        if(c === '"'){
          if(text[i+1] === '"'){ field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else {
        if(c === '"') inQuotes = true;
        else if(c === ','){ row.push(field); field=''; }
        else if(c === '\r'){ /* skip */ }
        else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else field += c;
      }
    }
    if(field.length>0 || row.length>0){ row.push(field); rows.push(row); }
    // drop fully blank rows (also removes trailing empty rows Google pads the export with)
    return rows.filter(r => r.some(c => c.trim() !== ''));
  }

  // Merge a two-row header (group row + sub row) into flat header labels,
  // forward-filling merged group cells (e.g. "รายปี" spanning 2 columns).
  function mergeHeaders(groupRow, subRow){
    const len = Math.max(groupRow.length, subRow.length);
    const merged = [];
    let lastGroup = '';
    for(let i=0;i<len;i++){
      const g = (groupRow[i] || '').trim();
      if(g) lastGroup = g;
      const s = (subRow[i] || '').trim();
      if(i < 2){
        merged.push(g || s || '');           // ที่ / กฟฟ. columns: never combine
      } else if(s){
        merged.push(`${lastGroup} — ${s}`);
      } else {
        merged.push(lastGroup);
      }
    }
    return merged;
  }

  // gviz flattens the report title + multi-row group/sub headers into ONE row
  // (column A ends up "<title> ที่"), with data starting immediately after.
  // Detect that pattern and split the title back out; fall back to the older
  // multi-row detection for plain /export-style CSV.
  function splitTitleFromFirstHeader(h0){
    const trimmed = (h0 || '').trim();
    const parts = trimmed.split(/\s+/);
    const last = parts[parts.length - 1];
    if(last === 'ที่' && parts.length > 1){
      return { title: parts.slice(0, -1).join(' '), label: 'ที่' };
    }
    return { title: '', label: trimmed };
  }

  // Merge the "ที่" (row number) column into "กฟฟ." (name) column, keeping the
  // total-row label (which lives in the "ที่" cell) intact.
  function mergeNoAndPea(hdrs, dataRows, title){
    const noIdx = hdrs.findIndex(h => h.trim() === 'ที่');
    const peaIdx = hdrs.findIndex(h => h.includes('กฟฟ'));
    if(noIdx === -1 || peaIdx === -1) return { title, headers: hdrs, dataRows };

    const merged = dataRows.map(r => {
      const row = r.slice();
      const isTotal = (r[0] || '').includes('รวม') || (r[1] || '').includes('รวม');
      row[peaIdx] = (isTotal ? r[noIdx] : (r[peaIdx] || '')).toString().trim();
      row.splice(noIdx, 1);
      return row;
    });
    const newHdrs = hdrs.slice();
    newHdrs.splice(noIdx, 1);
    return { title, headers: newHdrs, dataRows: merged };
  }

  function analyzeStructure(rows){
    // gviz-style: row 1 already starts with a plain row number → headers are
    // fully flattened into row 0.
    const looksFlattened = /^\d+$/.test(((rows[1] || [])[0] || '').trim());

    if(looksFlattened){
      const rawHeaders = (rows[0] || []).map(c => c.trim());
      const split = splitTitleFromFirstHeader(rawHeaders[0]);
      rawHeaders[0] = split.label;

      let numCols = 0;
      rawHeaders.forEach((h, i) => { if(h && h.trim() !== '') numCols = i + 1; });
      const hdrs = rawHeaders.slice(0, numCols);
      const dataRows = rows.slice(1).map(r => r.slice(0, numCols));
      return mergeNoAndPea(hdrs, dataRows, split.title);
    }

    // Fallback: /export-style CSV — separate title row, then 1-2 header rows.
    let hIdx = rows.findIndex(r => (r[0] || '').trim() === 'ที่' && (r[1] || '').includes('กฟฟ'));
    if(hIdx === -1) hIdx = rows.findIndex(r => r.some(c => c.includes('กฟฟ')));
    if(hIdx === -1) hIdx = 0;

    let title = '';
    for(let i = 0; i < hIdx; i++){
      const cell = (rows[i] || []).find(c => c.trim() !== '');
      if(cell){ title = cell.trim(); break; }
    }

    const r1 = rows[hIdx] || [];
    const r2 = rows[hIdx + 1] || [];
    const subCount = r2.filter(c => c.trim() !== '').length;
    const nextRowIsData = /^\d+$/.test((r2[0] || '').trim());

    let hdrs, dataStart;
    if(!nextRowIsData && subCount >= 2){
      hdrs = mergeHeaders(r1, r2);
      dataStart = hIdx + 2;
    } else {
      hdrs = r1.map(c => c.trim());
      dataStart = hIdx + 1;
    }

    let numCols = 0;
    hdrs.forEach((h, i) => { if(h && h.trim() !== '') numCols = i + 1; });
    hdrs = hdrs.slice(0, numCols);
    const dataRows = rows.slice(dataStart).map(r => r.slice(0, numCols));

    return mergeNoAndPea(hdrs, dataRows, title);
  }

  function isNumeric(str){
    if(str === undefined || str === null) return false;
    const t = String(str).trim().replace(/,/g,'').replace('%','');
    if(t === '') return false;
    return !isNaN(t);
  }

  function pctClass(val){
    const n = parseFloat(String(val).replace('%',''));
    if(isNaN(n)) return '';
    if(n >= 80) return 'pct-good';
    if(n >= 50) return 'pct-mid';
    return 'pct-low';
  }

  function setStatus(state, extra){
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className = 'dot' + (state === 'error' ? ' err' : state === 'loading' ? ' loading' : '');
    if(state === 'loading'){
      text.textContent = 'กำลังโหลดข้อมูล...';
    } else if(state === 'ok'){
      const now = new Date();
      const timeStr = now.toLocaleString('th-TH', { dateStyle:'medium', timeStyle:'short' });
      text.innerHTML = `อัปเดตล่าสุด: <strong>${timeStr}</strong> · ทั้งหมด <span class="count">${extra}</span> กฟฟ.`;
    } else if(state === 'error'){
      text.textContent = 'โหลดข้อมูลไม่สำเร็จ';
    }
  }

  function showError(msg){
    const box = document.getElementById('errorBox');
    box.innerHTML = `
      <div class="error-box">
        <strong>ดึงข้อมูลไม่สำเร็จ:</strong> ${msg}<br>
        กรุณาตรวจสอบว่าชีตตั้งค่าการแชร์เป็น <code>ทุกคนที่มีลิงก์ดูได้</code> (Anyone with the link can view)
        หรือลองเผยแพร่สู่เว็บผ่านเมนู <code>File → Share → Publish to web</code> แล้วกด “อัปเดตข้อมูลทันที” อีกครั้ง
      </div>`;
  }
  function clearError(){ document.getElementById('errorBox').innerHTML = ''; }

  function detectColumns(){
    peaColIndex = headers.findIndex(h => h.includes('กฟฟ'));
    if(peaColIndex === -1) peaColIndex = 0;
    pctColIndex = headers.findIndex(h => h.includes('ร้อยละ') || h.includes('%'));
    planColIndex = headers.findIndex(h => h.includes('รวม') && (h.includes('แผน') || h.includes('แผนที่')));
    actualColIndex = headers.findIndex(h => h.includes('รวม') && h.includes('ผลการดำเนินการ'));
  }

  function buildHead(){
    const thead = document.getElementById('tableHead');
    thead.innerHTML = '<tr>' + headers.map(h => `<th>${(h || '-').replace(/\n+/g,' ').trim()}</th>`).join('') + '</tr>';
  }

  function isTotalRow(r){
    const cell = r[peaColIndex] !== undefined ? r[peaColIndex] : r[0];
    return (cell || '').includes('รวม');
  }

  function buildBody(rows){
    const tbody = document.getElementById('tableBody');
    if(rows.length === 0){
      tbody.innerHTML = `<tr><td colspan="${headers.length || 1}">
        <div class="empty-state"><div class="big">🔍</div>ไม่พบข้อมูลที่ตรงกับตัวกรอง</div>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r => {
      const isTotal = isTotalRow(r);
      let cells = '';
      for(let i = 0; i < headers.length; i++){
        const val = r[i];
        let cls = '';
        if(i === peaColIndex) cls = 'pea-col';
        else if(isNumeric(val)) cls = 'num';
        if(i === pctColIndex && val && val.trim() !== ''){
          cells += `<td class="${cls}"><span class="pct-pill ${pctClass(val)}">${val}</span></td>`;
        } else {
          cells += `<td class="${cls}">${val === undefined ? '' : val}</td>`;
        }
      }
      return `<tr class="${isTotal ? 'total-row' : ''}">${cells}</tr>`;
    }).join('');
  }

  function populateDatalist(rows){
    if(peaColIndex === -1) return;
    const names = [...new Set(rows.filter(r => !isTotalRow(r)).map(r => (r[peaColIndex] || '').trim()).filter(Boolean))];
    const list = document.getElementById('peaList');
    list.innerHTML = names.map(n => `<option value="${n}"></option>`).join('');
  }

  function toNum(val){
    if(val === undefined || val === null) return 0;
    const t = String(val).trim().replace(/,/g,'').replace('%','');
    const n = parseFloat(t);
    return isNaN(n) ? 0 : n;
  }

  function escapeXml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]));
  }

  function renderBarChartSVG(labels, planData, actualData){
    const barW = 12, barGap = 3, groupGap = 26;
    const padTop = 16, padBottom = 96, padLeft = 54, padRight = 16;
    const chartH = 300;
    const groupW = barW * 2 + barGap;
    const plotH = chartH - padTop - padBottom;
    const width = padLeft + padRight + Math.max(1, labels.length) * (groupW + groupGap);
    const maxVal = Math.max(1, ...planData, ...actualData);
    const scaleY = plotH / maxVal;
    const baseY = chartH - padBottom;

    let grid = '';
    const ticks = 4;
    for(let t = 0; t <= ticks; t++){
      const val = maxVal * t / ticks;
      const y = baseY - val * scaleY;
      grid += `<line x1="${padLeft}" y1="${y}" x2="${width - padRight}" y2="${y}" stroke="#e3dcf1" stroke-width="1"/>`;
      grid += `<text x="${padLeft - 8}" y="${y + 4}" font-size="10" fill="#6f6580" text-anchor="end">${Math.round(val).toLocaleString('th-TH')}</text>`;
    }

    let bars = '';
    labels.forEach((label, i) => {
      const gx = padLeft + i * (groupW + groupGap);
      const planH = planData[i] * scaleY;
      const actualH = actualData[i] * scaleY;
      const cx = gx + groupW / 2;
      bars += `<rect x="${gx}" y="${baseY - planH}" width="${barW}" height="${planH}" fill="#c4b5f2" rx="3"/>`;
      bars += `<rect x="${gx + barW + barGap}" y="${baseY - actualH}" width="${barW}" height="${actualH}" fill="#5b2a86" rx="3"/>`;
      bars += `<text x="0" y="0" font-size="10.5" fill="#6f6580" text-anchor="end" transform="translate(${cx},${baseY + 14}) rotate(-48)">${escapeXml(label)}</text>`;
    });

    return `<svg width="${width}" height="${chartH}" viewBox="0 0 ${width} ${chartH}" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans Thai',sans-serif">${grid}${bars}</svg>`;
  }

  function updateChart(rows){
    const inner = document.getElementById('chartInner');
    if(!inner || planColIndex === -1 || actualColIndex === -1) return;

    const rowsForChart = rows.filter(r => !isTotalRow(r) && (r[peaColIndex] || '').trim() !== '');
    if(rowsForChart.length === 0){
      inner.innerHTML = `<div class="empty-state"><div class="big">📊</div>ไม่มีข้อมูลให้แสดงกราฟ</div>`;
      return;
    }
    const labels = rowsForChart.map(r => r[peaColIndex]);
    const planData = rowsForChart.map(r => toNum(r[planColIndex]));
    const actualData = rowsForChart.map(r => toNum(r[actualColIndex]));
    inner.innerHTML = renderBarChartSVG(labels, planData, actualData);
  }

  function applyFilter(){
    const q = document.getElementById('peaSearch').value.trim().toLowerCase();
    const filtered = !q ? dataRowsAll : dataRowsAll.filter(r => {
      const cell = (r[peaColIndex] || '').toLowerCase();
      return cell.includes(q) || isTotalRow(r);
    });
    buildBody(filtered);
    updateChart(filtered);
  }

  async function loadData(){
    setStatus('loading');
    clearError();
    const btn = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.disabled = true;
    icon.classList.add('spin');
    try{
      const res = await fetch(CSV_URL + `&cachebust=${Date.now()}`);
      if(!res.ok) throw new Error(`สถานะ HTTP ${res.status}`);
      const text = await res.text();
      const rows = parseCSV(text);
      if(rows.length < 1) throw new Error('ไม่พบข้อมูลในชีต');

      const structure = analyzeStructure(rows);
      headers = structure.headers;
      dataRowsAll = structure.dataRows;
      detectColumns();
      buildHead();
      populateDatalist(dataRowsAll);
      applyFilter();

      document.getElementById('pageTitle').textContent =
        structure.title || 'รายงานผลการดำเนินการ กฟฟ.';

      const realCount = dataRowsAll.filter(r => !isTotalRow(r) && (r[peaColIndex] || '').trim() !== '').length;
      setStatus('ok', realCount);
    }catch(err){
      setStatus('error');
      showError(err.message || 'ไม่ทราบสาเหตุ');
      if(document.getElementById('pageTitle').textContent === 'กำลังโหลดชื่อรายงาน...'){
        document.getElementById('pageTitle').textContent = 'รายงานผลการดำเนินการ กฟฟ.';
      }
    }finally{
      btn.disabled = false;
      icon.classList.remove('spin');
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', loadData);
  document.getElementById('peaSearch').addEventListener('input', applyFilter);
  document.getElementById('clearFilter').addEventListener('click', () => {
    document.getElementById('peaSearch').value = '';
    applyFilter();
  });

  // Auto-refresh check: every 30s, trigger once per day at 20:00 local time (while page is open)
  setInterval(() => {
    const now = new Date();
    const todayStr = now.toDateString();
    if(now.getHours() === 20 && now.getMinutes() === 0 && lastAutoRefreshDate !== todayStr){
      lastAutoRefreshDate = todayStr;
      loadData();
    }
  }, 30000);

  loadData();
</script>
</body>
</html>
